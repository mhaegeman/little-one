<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lille Liv — Preview</title>
    <style>
      :root {
        --stage: #0e0d0c;
        --stage-soft: #1a1814;
        --label: rgba(255, 255, 255, 0.45);
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: var(--stage);
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: white;
      }

      /* ── Stage: dark cinema backdrop ──────────────────── */
      .stage {
        position: fixed; inset: 0;
        display: grid; place-items: center;
        background:
          radial-gradient(ellipse at 50% 30%, var(--stage-soft) 0%, var(--stage) 60%),
          var(--stage);
      }

      /* ── Frame: 1080×1920 letterbox container ─────────
         Aspect ratio fixed at 9:16; content scales inside.
         On mobile (portrait phones) we go full-bleed.
         On desktop (and any landscape) we cap to viewport. */
      .frame {
        position: relative;
        aspect-ratio: 9 / 16;
        background: #FBF6EE;
        overflow: hidden;
        box-shadow:
          0 50px 120px rgba(0, 0, 0, 0.55),
          0 8px 24px rgba(0, 0, 0, 0.35);
        border-radius: 28px;
      }

      /* Default: desktop / landscape — fit to viewport, leave breathing room */
      @media (orientation: landscape), (min-width: 768px) {
        .frame {
          height: min(96vh, calc(96vw * 16 / 9));
          width: auto;
        }
      }

      /* Mobile portrait — full-bleed, no rounding, no shadow */
      @media (orientation: portrait) and (max-width: 767px) {
        .stage { background: #000; }
        .frame {
          width: 100vw;
          height: 100vh;
          height: 100dvh;
          border-radius: 0;
          box-shadow: none;
        }
        .label, .controls-hint { display: none; }
      }

      /* The actual HyperFrames player fills the frame */
      hyperframes-player {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        display: block;
      }

      /* ── Format label (desktop only) ──────────────────── */
      .label {
        position: fixed;
        top: 20px; left: 24px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--label);
        display: flex; align-items: center; gap: 10px;
        pointer-events: none;
        z-index: 10;
      }
      .label .dot {
        width: 6px; height: 6px; border-radius: 999px;
        background: #79B98A;
        box-shadow: 0 0 0 3px rgba(121, 185, 138, 0.18);
      }
      .label .dim { opacity: 0.6; }

      .controls-hint {
        position: fixed;
        bottom: 20px; right: 24px;
        font-size: 11px; font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--label);
        pointer-events: none;
        z-index: 10;
      }
    </style>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hyperframes/player"></script>
  </head>
  <body>
    <div class="label">
      <span class="dot"></span>
      <span>Lille Liv · Mobile reel</span>
      <span class="dim">1080 × 1920 · 16s</span>
    </div>

    <div class="stage">
      <div class="frame">
        <hyperframes-player id="p" controls autoplay muted loop></hyperframes-player>
      </div>
    </div>

    <div class="controls-hint">space · play / pause</div>

    <script>
      // Forward query string (e.g. ?t=4.5) to the composition
      document.getElementById("p").setAttribute("src", "./index.html" + location.search);

      // Spacebar play/pause for nicer desktop demoing
      const player = document.getElementById("p");
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && !e.target.closest("input, textarea")) {
          e.preventDefault();
          if (player.paused) player.play?.(); else player.pause?.();
        }
      });
    </script>
  </body>
</html>
