<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>Lille Liv — Preview (Mobile)</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      .frame {
        position: fixed; inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: #FBF6EE;
        overflow: hidden;
      }
      hyperframes-player {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        display: block;
      }
    </style>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hyperframes/player"></script>
  </head>
  <body>
    <div class="frame">
      <hyperframes-player id="p" controls autoplay muted loop playsinline></hyperframes-player>
    </div>

    <script>
      document.getElementById("p").setAttribute("src", "./index.html" + location.search);
    </script>
  </body>
</html>
