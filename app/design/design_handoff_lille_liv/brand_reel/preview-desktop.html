<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>Lille Liv — Preview (Desktop)</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #0e0d0c;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: white;
      }
      .stage {
        position: fixed; inset: 0;
        display: grid; place-items: center;
        background:
          radial-gradient(ellipse at 50% 30%, #1a1814 0%, #0e0d0c 60%),
          #0e0d0c;
      }
      .frame {
        position: relative;
        aspect-ratio: 9 / 16;
        height: min(94vh, calc(94vw * 16 / 9));
        background: #FBF6EE;
        overflow: hidden;
        border-radius: 28px;
        box-shadow:
          0 50px 120px rgba(0, 0, 0, 0.55),
          0 8px 24px rgba(0, 0, 0, 0.35);
      }
      hyperframes-player {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        display: block;
      }
      .label {
        position: fixed;
        top: 20px; left: 24px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        display: flex; align-items: center; gap: 10px;
        pointer-events: none; z-index: 10;
      }
      .label .dot {
        width: 6px; height: 6px; border-radius: 999px;
        background: #79B98A;
        box-shadow: 0 0 0 3px rgba(121, 185, 138, 0.18);
      }
      .label .dim { opacity: 0.6; }
      .hint {
        position: fixed;
        bottom: 20px; right: 24px;
        font-size: 11px; font-weight: 500;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.45);
        pointer-events: none; z-index: 10;
      }
    </style>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hyperframes/player"></script>
  </head>
  <body>
    <div class="label">
      <span class="dot"></span>
      <span>Lille Liv · Mobile reel</span>
      <span class="dim">1080 × 1920 · 16s</span>
    </div>

    <div class="stage">
      <div class="frame">
        <hyperframes-player id="p" controls autoplay muted loop></hyperframes-player>
      </div>
    </div>

    <div class="hint">space · play / pause</div>

    <script>
      document.getElementById("p").setAttribute("src", "./index.html" + location.search);
      const player = document.getElementById("p");
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && !e.target.closest("input, textarea")) {
          e.preventDefault();
          if (player.paused) player.play?.(); else player.pause?.();
        }
      });
    </script>
  </body>
</html>
