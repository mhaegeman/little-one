<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1400, initial-scale=1" />
  <title>Lille Liv — Scandinavian rework</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..700,30..100,0..1&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #efe9dd; font-family: "DM Sans", system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="landing-1.jsx"></script>
  <script type="text/babel" src="landing-2.jsx"></script>
  <script type="text/babel" src="landing-3.jsx"></script>
  <script type="text/babel" src="app-screens.jsx"></script>

  <script type="text/babel">
    const {
      DesignCanvas, DCSection, DCArtboard,
      TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect,
      ThemeProvider,
      LandingHeroLed, LandingEditorial, LandingConversational,
      DiscoverScreen, JournalScreen, FamiliesScreen, MobileDiscover,
    } = window;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "pastel",
      "font": "recoleta"
    }/*EDITMODE-END*/;

    function Frame({ palette, font, children, height }) {
      return (
        <ThemeProvider palette={palette} font={font}>
          <div style={{ width: "100%", height: height || "auto", overflow: "hidden", background: "#FBF6EE" }}>
            {children}
          </div>
        </ThemeProvider>
      );
    }

    function App() {
      const [tw, setTw] = useTweaks(TWEAK_DEFAULTS);
      const palette = tw.palette;
      const font = tw.font;

      return (
        <React.Fragment>
          <DesignCanvas title="Lille Liv — Scandinavian rework" subtitle="Landing page directions + restyled in-app screens">
            <DCSection id="landing" title="Landing page — 3 directions">
              <DCArtboard id="hero-led" label="01 · Hero-led with phone preview" width={1280} height={2680}>
                <Frame palette={palette} font={font}><LandingHeroLed /></Frame>
              </DCArtboard>
              <DCArtboard id="editorial" label="02 · Editorial split-frame" width={1280} height={2400}>
                <Frame palette={palette} font={font}><LandingEditorial /></Frame>
              </DCArtboard>
              <DCArtboard id="conversational" label="03 · Conversational card stack" width={1280} height={2380}>
                <Frame palette={palette} font={font}><LandingConversational /></Frame>
              </DCArtboard>
            </DCSection>

            <DCSection id="app-desktop" title="Restyled in-app screens — desktop">
              <DCArtboard id="discover" label="Discover · /" width={1280} height={820}>
                <Frame palette={palette} font={font} height={820}><DiscoverScreen /></Frame>
              </DCArtboard>
              <DCArtboard id="journal" label="Journal · /journal" width={1280} height={1100}>
                <Frame palette={palette} font={font} height={1100}><JournalScreen /></Frame>
              </DCArtboard>
              <DCArtboard id="families" label="Families · /families" width={1280} height={820}>
                <Frame palette={palette} font={font} height={820}><FamiliesScreen /></Frame>
              </DCArtboard>
            </DCSection>

            <DCSection id="app-mobile" title="Restyled in-app screen — mobile">
              <DCArtboard id="mobile-discover" label="Discover · iPhone" width={390} height={780}>
                <Frame palette={palette} font={font} height={780}><MobileDiscover /></Frame>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Palette">
              <TweakSelect
                label="Color direction"
                value={palette}
                onChange={(v) => setTw("palette", v)}
                options={[
                  { value: "pastel", label: "Pastel toy-box (recommended)" },
                  { value: "sage",   label: "Soft sage (current, softened)" },
                  { value: "cream",  label: "Warm cream" },
                ]}
              />
            </TweakSection>
            <TweakSection title="Display font">
              <TweakSelect
                label="Display typeface"
                value={font}
                onChange={(v) => setTw("font", v)}
                options={[
                  { value: "instrument", label: "Instrument Serif (recommended)" },
                  { value: "recoleta",   label: "Fraunces (rounder serif)" },
                  { value: "general",    label: "DM Sans (all-sans)" },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
